coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
        informational: false
    patch:
      default:
        target: 80%
        threshold: 5%

  ignore:
    - "tests/**"
    - "src/thirdeye/_version.py"
    - ".workbench/**"

comment:
  layout: "header, diff, files"
  behavior: default
  require_changes: false
